<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Tracker Dashboard</title>
    <!-- Modern Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="dark-theme">
    <div class="background-glows">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <div class="app-container">
        <!-- Dashboard Header (merged with controls) -->
        <header class="app-header">
            <div class="header-left">
                <h1>Paper Tracker</h1>
            </div>

            <div class="header-right">
                <div class="toolbar-section">
                    <div id="modeToggle" class="mode-toggle" title="Switch between Papers and Grants mode">
                        <span class="mode-option active" data-mode="papers">Papers</span>
                        <span class="mode-option" data-mode="grants">Grants</span>
                    </div>
                    <button id="calendarViewBtn" class="action-btn secondary" title="View deadlines on a calendar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        Calendar
                        <span id="deadlineCount" class="dot-badge"></span>
                    </button>
                    <button id="archiveBtn" class="action-btn secondary" title="View archived papers">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8v13H3V8"></path><path d="M1 3h22v5H1z"></path><line x1="10" y1="12" x2="14" y2="12"></line></svg>
                        Archive
                        <span id="archiveCount" class="dot-badge"></span>
                    </button>
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-section">
                    <button id="addPaperBtn" class="action-btn secondary" title="Add a new entry">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        <span id="addLabel">Add Paper</span>
                    </button>
                    <button id="sortDeadlineBtn" class="action-btn secondary" title="Sort papers by deadline">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="10" y2="6"></line><line x1="4" y1="12" x2="14" y2="12"></line><line x1="4" y1="18" x2="18" y2="18"></line></svg>
                        Sort by Deadline
                    </button>
                </div>
                <div class="toolbar-divider"></div>
                <div class="toolbar-section">
                    <button id="themeToggle" class="icon-btn" title="Toggle Theme" aria-label="Toggle dark/light theme">
                        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
                        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
                    </button>
                    <div class="db-badge">
                        <span class="db-status-dot"></span>
                        <span id="dbStatus">Connecting...</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Kanban Board Container -->
        <main class="board-wrapper">
            <!-- Rendered Board Grid -->
            <div id="boardContainer" class="board-grid paper-columns-layout">
                <!-- Columns dynamically injected here by app.js -->
            </div>
        </main>
    </div>

    <!-- Edit Details Modal Dialogue -->
    <dialog id="cardModal" class="glass-modal">
        <div class="modal-content">
            <header class="modal-header">
                <div class="modal-title-area">
                    <h2 id="modalTitle">Edit Section Details</h2>
                </div>
                <button id="closeModalBtn" class="close-modal-btn" aria-label="Close dialog">&times;</button>
            </header>
            <form id="modalForm" method="dialog">
                <div class="form-body">
                    <div class="form-group">
                        <label for="editSectionName">Section Name</label>
                        <input type="text" id="editSectionName" autocomplete="off" list="sectionNames" required placeholder="e.g. Introduction">
                    </div>
                </div>

                <footer class="modal-footer">
                    <button type="button" id="deleteCardBtn" class="modal-btn danger-outline">Delete Section</button>
                    <div class="footer-right">
                        <button type="button" id="cancelModalBtn" class="modal-btn secondary">Cancel</button>
                        <button type="submit" id="saveModalBtn" class="modal-btn primary">Save Changes</button>
                    </div>
                </footer>
            </form>
        </div>
    </dialog>

    <!-- Edit Paper Details / Deadline Modal -->
    <dialog id="paperModal" class="glass-modal">
        <div class="modal-content">
            <header class="modal-header">
                <div class="modal-title-area">
                    <h2 id="paperModalTitle">New Paper</h2>
                </div>
            </header>
            <form id="paperModalForm" method="dialog">
                <div class="form-body">
                    <!-- Paper Name -->
                    <div class="form-group">
                        <label for="editPaperName">Paper Name</label>
                        <input type="text" id="editPaperName" autocomplete="off" required placeholder="e.g. My Research Paper">
                    </div>

                    <!-- Deadline Date -->
                    <div class="form-group">
                        <label for="editPaperDeadlineDate">Submission Deadline</label>
                        <input type="text" id="editPaperDeadlineDate" readonly placeholder="No deadline set">
                    </div>

                </div>

                <footer class="modal-footer">
                    <div class="footer-right">
                        <button type="button" id="cancelPaperModalBtn" class="modal-btn secondary">Cancel</button>
                        <button type="submit" id="savePaperModalBtn" class="modal-btn primary">Save Changes</button>
                    </div>
                </footer>
            </form>
        </div>
    </dialog>

    <!-- Confirmation Dialog -->
    <dialog id="confirmDialog" class="glass-modal small-modal">
        <div class="modal-content">
            <h3 id="confirmTitle">Are you sure?</h3>
            <p id="confirmMessage">This action cannot be undone.</p>
            <div class="modal-footer">
                <button id="confirmCancelBtn" class="modal-btn secondary">Cancel</button>
                <button id="confirmYesBtn" class="modal-btn danger">Yes, Proceed</button>
            </div>
        </div>
    </dialog>

    <!-- Calendar Modal -->
    <dialog id="calendarModal" class="glass-modal wide-modal">
        <div class="modal-content">
            <header class="modal-header">
                <div class="modal-title-area">
                    <span class="modal-paper-badge">Calendar</span>
                    <h2>Paper Deadlines</h2>
                </div>
                <button id="closeCalendarBtn" class="close-modal-btn" aria-label="Close dialog">&times;</button>
            </header>
            <div id="calendarBody" class="calendar-body"></div>
        </div>
    </dialog>

    <!-- Firebase SDK (compat, loaded via CDN — no bundler needed) -->
    <script src="https://www.gstatic.com/firebasejs/11.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.8.1/firebase-firestore-compat.js"></script>

    <!-- App Scripts -->
    <script src="firebase-config.js"></script>
    <script src="utils.js"></script>
    <script src="state.js"></script>
    <script src="calendar.js"></script>
    <script src="ui.js"></script>
    <script src="app.js"></script>

    <datalist id="sectionNames">
        <option value="Abstract">
        <option value="Introduction">
        <option value="Related Work">
        <option value="Methods">
        <option value="Implementation">
        <option value="Dataset">
        <option value="Results">
        <option value="Evaluation">
        <option value="Discussion">
        <option value="Conclusion">
        <option value="Objectives">
        <option value="Appendix">
    </datalist>
</body>

</html>
